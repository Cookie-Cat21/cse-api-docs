name: probe

on:
  workflow_dispatch:
  schedule:
    - cron: "0 6 * * 1" # weekly Monday 06:00 UTC
  push:
    branches: [main]

jobs:
  probe:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -r requirements.txt
      - name: Probe live API
        run: python3 scripts/probe.py
      - name: Build site
        run: python3 scripts/build_site.py
      - name: Upload site artifact
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: site
      - name: Upload probe report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: probe-report
          path: |
            catalog/last_probe.json
            catalog/PROBE_REPORT.md
